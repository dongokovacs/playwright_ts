name: All Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pages: write
  id-token: write

jobs:
  full-suite:
    runs-on: ubuntu-latest
    # Pinned to the same Playwright version as package.json/Dockerfile —
    # browsers and their OS deps are already baked in here, so there's no
    # "Install Playwright browsers" step below.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    timeout-minutes: 15
    steps:
      # Container jobs run as a different UID than the one that owns the
      # runner's checked-out workspace, so git refuses to touch it
      # ("detected dubious ownership") unless it's explicitly trusted first.
      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

      - name: Run full suite
        run: npm test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Publish test results as a GitHub check
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Pages-only on a push to main, not on PRs — PR runs would race each
      # other overwriting the same shared Pages site with no stable URL.
      - name: Build Pages site (README landing page + report)
        if: always() && github.event_name == 'push'
        run: |
          npm run build:pages
          cp -r playwright-report pages-site/report

      - name: Upload Playwright report (Pages artifact)
        if: always() && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site/

  publish-report:
    needs: full-suite
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
