name: All Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  full-suite:
    runs-on: ubuntu-latest
    # Pinned to the same Playwright version as package.json/Dockerfile —
    # browsers and their OS deps are already baked in here, so there's no
    # "Install Playwright browsers" step below.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

      - name: Run full suite
        run: npm test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Publish test results as a GitHub check
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
